<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Mold Calculator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <script type="module" src="main.js"></script>
</head>
<body>

<div class="app">
  <header>
    <h1>Character Mold Calculator</h1>
    <p class="subtitle">Format: Numbers</p>
  </header>

  <main>
    <div class="card left">
      
      <div class="input-row">
        <div class="input-group">
          <label>Start Date</label>
          <div class="date-wrapper">
            <input type="text" id="startDateDisplay" readonly placeholder="DD MMM YYYY">
            <input type="date" id="startDate" class="date-overlay">
          </div>
        </div>
        <div class="input-group">
          <label>End Date</label>
          <div class="date-wrapper">
            <input type="text" id="endDateDisplay" readonly placeholder="DD MMM YYYY">
            <input type="date" id="endDate" class="date-overlay">
          </div>
        </div>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label>Min Shelf Life (Days)</label>
          <input type="number" id="minShelf" value="180" min="0">
        </div>
        <div class="input-group">
          <label>Max Shelf Life (Days)</label>
          <input type="number" id="maxShelf" value="365" min="0">
        </div>
      </div>

      <div class="input-group">
        <label>Select Shifts</label>
        <div class="checkbox-group" id="shiftsContainer">
          </div>
      </div>

      <div class="input-group">
        <label>Select Locations</label>
        <div class="checkbox-group" id="locsContainer">
          </div>
      </div>

      <div class="input-group">
        <label>Reverse Year Code</label>
        <select id="revYear">
          <option value="true" selected>True</option>
          <option value="false">False</option>
        </select>
      </div>

      <div class="input-group">
        <label>Reverse Day Code</label>
        <select id="revDate">
          <option value="true" selected>True</option>
          <option value="false">False</option>
        </select>
      </div>

      <div class="input-group">
        <label>Reverse Shift-Loc Code</label>
        <select id="revSL">
          <option value="true" selected>True</option>
          <option value="false">False</option>
        </select>
      </div>

      <button id="calculateBtn" class="btn-calculate">Calculate</button>
    </div>

    <div class="card right">
      
      <h3>Mold Requirements</h3>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Number (0-9)</th>
              <th>Max Molds Needed</th>
            </tr>
          </thead>
          <tbody id="summaryTbody">
            </tbody>
        </table>
      </div>

      <h3>Max Repetition</h3>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Number</th>
              <th>Prod Date</th>
              <th>Exp Date</th>
              <th>Shift</th>
              <th>Loc</th>
              <th>Prod Code</th>
              <th>Exp</th>
            </tr>
          </thead>
          <tbody id="proofTbody">
            </tbody>
        </table>
      </div>

      <h3>Combinations Log</h3>
      <div class="warning-text" id="rowWarning"></div>
      <div class="table-container scrollable">
        <table>
          <thead>
            <tr>
              <th>No.</th>
              <th>Prod Date</th>
              <th>Exp Date</th>
              <th>Shift</th>
              <th>Loc</th>
              <th>Prod Code</th>
              <th>Exp</th>
            </tr>
          </thead>
          <tbody id="detailTbody">
            </tbody>
        </table>
      </div>

      <div class="pagination" id="paginationControls" style="display: none;">
        <button id="btnFirst" title="First Page">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="m18.75 4.5-7.5 7.5 7.5 7.5m-6-15L5.25 12l7.5 7.5" />
          </svg>
        </button>
        <button id="btnPrev" title="Previous Page">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
          </svg>
        </button>
        <span class="page-indicator" id="pageIndicator">Page 1 of 1</span>
        <button id="btnNext" title="Next Page">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
          </svg>
        </button>
        <button id="btnLast" title="Last Page">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="m5.25 4.5 7.5 7.5-7.5 7.5m6-15 7.5 7.5-7.5 7.5" />
          </svg>
        </button>
      </div>

    </div>
  </main>
</div>

</body>
</html>
